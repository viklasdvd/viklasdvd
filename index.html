<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Windows Unlock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0f;
            background-image: radial-gradient(circle at 25% 0%, rgba(0, 120, 212, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 75% 100%, rgba(0, 164, 239, 0.06) 0%, transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }
        
        .card {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 56px;
            padding: 52px 44px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            width: 380px;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .card:hover {
            transform: translateY(-2px);
        }
        
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 16px rgba(0, 120, 212, 0.2));
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 0%, #a0c0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }
        
        .sub {
            color: #8e8e9a;
            margin-bottom: 36px;
            font-size: 14px;
            font-weight: 400;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #0078d4 0%, #0094ff 100%);
            color: white;
            border: none;
            width: 220px;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 120, 212, 0.3);
            letter-spacing: 0.3px;
        }
        
        .login-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #0086e8 0%, #00a0ff 100%);
            box-shadow: 0 12px 28px rgba(0, 120, 212, 0.4);
        }
        
        .login-btn:active {
            transform: scale(0.98);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 28px;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
        }
        
        .status.success {
            color: #4cd964;
            background: rgba(76, 217, 100, 0.1);
        }
        
        .status.error {
            color: #ff5e5e;
            background: rgba(255, 94, 94, 0.1);
        }
        
        .status.waiting {
            color: #ffcc44;
            background: rgba(255, 204, 68, 0.08);
        }
        
        .device-id {
            font-size: 10px;
            color: #5a5a66;
            margin-top: 32px;
            word-break: break-all;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 40px;
            font-family: monospace;
            letter-spacing: 0.3px;
        }
        
        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(76, 217, 100, 0.08);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            color: #4cd964;
            margin-bottom: 24px;
        }
        
        hr {
            border: none;
            height: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            margin: 24px 0 16px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .pulse-text {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">💻🔒</div>
        <h1>Windows Unlock</h1>
        <div class="sub">Remote authorization required</div>
        
        <div class="secure-badge">
            <span>✓</span> <span>End-to-end encrypted</span>
        </div>
        
        <button class="login-btn" id="unlockBtn">
            🔓 LOGIN & UNLOCK
        </button>
        
        <div id="status" class="status waiting pulse-text">
            ⚡ Ready to authorize
        </div>
        
        <hr>
        <div id="deviceId" class="device-id"></div>
        <div style="font-size: 9px; color: #3a3a44; margin-top: 12px;">
            Session secured • One-time approval
        </div>
    </div>

    <script>
        // Генерация уникального ID устройства (браузер)
        function getDeviceId() {
            let deviceId = localStorage.getItem('unlock_device_id');
            if (!deviceId) {
                deviceId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
                localStorage.setItem('unlock_device_id', deviceId);
            }
            return deviceId;
        }

        const deviceId = getDeviceId();
        // Если программа на ПК запущена на другом порту или IP — измени здесь
        const PC_IP = '127.0.0.1:5001';  

        document.getElementById('deviceId').innerHTML = `🖥️ Device fingerprint: <strong>${deviceId.slice(0, 8)}...${deviceId.slice(-4)}</strong>`;

        const btn = document.getElementById('unlockBtn');
        const statusDiv = document.getElementById('status');

        async function registerAndUnlock() {
            btn.disabled = true;
            btn.innerText = '⏳ SENDING REQUEST...';
            statusDiv.innerText = '📡 Contacting PC...';
            statusDiv.className = 'status waiting';
            
            try {
                // Шаг 1: регистрация устройства (если первое)
                const registerRes = await fetch(`http://${PC_IP}/api/register_device`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });
                const registerData = await registerRes.json();
                
                if (!registerData.success && registerData.locked) {
                    statusDiv.innerText = '❌ ANOTHER DEVICE ALREADY AUTHORIZED';
                    statusDiv.className = 'status error';
                    btn.innerText = '🔒 LOCKED';
                    btn.disabled = true;
                    return;
                }
                
                if (!registerData.success && !registerData.locked) {
                    statusDiv.innerText = '⚠️ Registration failed. Retry.';
                    statusDiv.className = 'status error';
                    btn.disabled = false;
                    btn.innerText = '🔓 LOGIN & UNLOCK';
                    return;
                }
                
                // Шаг 2: команда разблокировки
                statusDiv.innerText = '🔑 Sending unlock signal...';
                const unlockRes = await fetch(`http://${PC_IP}/api/unlock_command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId })
                });
                const unlockData = await unlockRes.json();
                
                if (unlockData.success) {
                    statusDiv.innerText = '✅ PC UNLOCKED! You can close this page.';
                    statusDiv.className = 'status success';
                    btn.innerText = '✓ UNLOCKED';
                    btn.disabled = true;
                    
                    // Доп. визуальный фидбек
                    const badge = document.querySelector('.secure-badge');
                    if (badge) badge.style.background = 'rgba(76, 217, 100, 0.2)';
                } else {
                    statusDiv.innerText = '❌ Unlock failed: ' + (unlockData.error || 'Unknown error');
                    statusDiv.className = 'status error';
                    btn.disabled = false;
                    btn.innerText = '🔓 LOGIN & UNLOCK';
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerText = '❌ Cannot connect to PC. Is the unlock program running?';
                statusDiv.className = 'status error';
                btn.disabled = false;
                btn.innerText = '🔓 LOGIN & UNLOCK';
            }
        }

        btn.addEventListener('click', registerAndUnlock);
        
        // Автоматическая попытка при загрузке (опционально, удобно)
        setTimeout(() => {
            if (btn.disabled === false) {
                // Не авто-кликаем, просто показываем статус готовности
                statusDiv.innerText = '⚡ Tap LOGIN to unlock your PC';
                statusDiv.className = 'status waiting';
            }
        }, 500);
    </script>
</body>
</html>

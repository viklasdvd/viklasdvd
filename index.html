<!DOCTYPE html>
<html>
<head>
    <title>Unlock PC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 60px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="unlockBtn">🔓 UNLOCK PC</button>
    <script>
        const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN'; // Нужен токен!
        const REPO = 'viklasdvd/viklasdvd';
        const FILE_PATH = 'index.txt';
        
        document.getElementById('unlockBtn').addEventListener('click', async () => {
            // Через GitHub API пишем 'true' в index.txt
            const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Unlock PC',
                    content: btoa('true'),
                    sha: 'CURRENT_FILE_SHA' // Нужно получить сначала
                })
            });
            alert('Unlock signal sent!');
        });
    </script>
</body>
</html>
